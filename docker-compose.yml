services:
  postgres:
    image: postgres:16
    container_name: xbrl-postgres
    environment:
      POSTGRES_DB: xbrl_validator
      POSTGRES_USER: xbrl
      POSTGRES_PASSWORD: xbrl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: